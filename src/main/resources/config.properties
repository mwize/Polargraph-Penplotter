# ─── Drawing area ────────────────────────────────────────────────────────────
# Horizontal distance between the two motor shafts, in mm
width=540
# Vertical drawing area, in mm
height=780

# ─── Home / start position ───────────────────────────────────────────────────
# Pen starting position (centred at the top edge by default)
startX=270
startY=70

# ─── Stepper motor calibration ───────────────────────────────────────────────
# How many motor steps are needed to move the timing belt exactly 1 mm
stepsPerMM=25

# ─── GPIO pin numbers (BCM numbering) ────────────────────────────────────────
# Left stepper motor
pin.left.enable=4
pin.left.step=18
pin.left.dir=24
# Right stepper motor
pin.right.enable=12
pin.right.step=19
pin.right.dir=13

# ─── Default SVG file ────────────────────────────────────────────────────────
# Used when no file path is passed as the first command-line argument
svg.file=/home/pi/Desktop/svg3.svg
